schema_version: 1

context:
  name: pydeps
  version: "3.0.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pydeps-${{ version }}.tar.gz
  sha256: 39ee2490bff2c21f71c04d45a8a041357fb9be5c973994bdc01ae07c9108138b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pydeps = pydeps.pydeps:pydeps

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - stdlib-list

tests:
  - python:
      imports:
        - pydeps
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pydeps --help

about:
  summary: Display module dependencies
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/thebjorn/pydeps
  documentation: https://pythonhosted.org/pydeps/

extra:
  recipe-maintainers:
    - thewchan
